<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Lareen ✨</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
font-family:Georgia, serif;
height:100vh;
}

/* الفيديو */

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
display:none;
z-index:-3;
}

/* الانترو */

.intro{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
overflow:hidden;
}

/* السباركلز */

.sparkles{
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:0.18;
animation:stars 60s linear infinite;
}

@keyframes stars{
from{
transform:translateY(0);
}
to{
transform:translateY(-1000px);
}
}

/* المحتوى */

.content{
position:relative;
text-align:center;
z-index:5;
animation:fade 2s ease;
}

h1{
font-size:100px;
color:white;
text-shadow:
0 0 20px rgba(255,255,255,0.8),
0 0 60px rgba(255,255,255,0.4);
margin-bottom:20px;
}

p{
font-size:28px;
color:white;
opacity:0.9;
margin-bottom:40px;
text-shadow:0 0 10px rgba(255,255,255,0.5);
}

/* الزر */

button{
padding:18px 45px;
font-size:20px;
border:none;
border-radius:50px;
background:rgba(255,255,255,0.1);
color:white;
cursor:pointer;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
transition:0.4s;
}

button:hover{
transform:scale(1.07);
background:rgba(255,255,255,0.18);
}

/* اختفاء الانترو */

.fadeOut{
animation:fadeOut 2s forwards;
}

@keyframes fadeOut{
to{
opacity:0;
visibility:hidden;
}
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<!-- الفيديو -->

<video id="bgVideo" loop playsinline>
<source src="lareen.mp4" type="video/mp4">
</video>

<!-- الانترو -->

<div class="intro" id="intro">

<div class="sparkles"></div>

<div class="content">

<h1>Lareen ✨</h1>

<p>
The brightest spell ever written beneath my sky.
</p>

<button onclick="startMagic()">
Open The Magic ✨
</button>

</div>

</div>

<!-- الأغنية -->

<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<script>

function startMagic(){

// تشغيل الأغنية
document.getElementById("music").play();

// إخفاء الانترو
document.getElementById("intro").classList.add("fadeOut");

// إظهار الفيديو
const video = document.getElementById("bgVideo");

video.style.display = "block";

video.play();

}

</script>

</body>
</html>
